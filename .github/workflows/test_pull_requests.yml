# Our minimal suite of tests that run on each pull request
name: PR Test

on:
  pull_request:
    branches:
      - main
      - "v*x"

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

env:
  COLUMNS: 120

jobs:
  import_lint:
    name: Import lint
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.12
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install tox
      - name: Run import lint
        run: tox -e import-lint

  manifest:
    # make sure all necessary files will be bundled in the release
    name: Check Manifest
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache-dependency-path: pyproject.toml
          cache: 'pip'
      - name: Install Dependencies
        run: pip install --upgrade pip
      - name: Install Napari dev
        run: pip install -e .  --group build
        env:
          PIP_CONSTRAINT: resources/constraints/constraints_py3.12.txt
      - name: Make Typestubs
        run: |
          make typestubs
      - name: Check Manifest
        run: |
          make check-manifest

  localization_syntax:
    # make sure all necessary files will be bundled in the release
    name: Check l18n syntax
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"
      - name: Check localization formatting
        run: |
          pip install --upgrade pip semgrep
          # f"..." and f'...' are the same for semgrep
          semgrep --error --lang python --pattern 'trans._(f"...")' src/napari
          semgrep --error --lang python --pattern "trans._(\$X.format(...))" src/napari

  build_wheel:
    name: Build wheel
    uses: ./.github/workflows/reusable_build_wheel.yml

  test_initial:
    name: ${{ matrix.label }}
    uses: ./.github/workflows/reusable_run_tox_test.yml
    needs: build_wheel
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: initial ubuntu py3.10 pyqt5
            python: "3.10"
            platform: ubuntu-latest
            backend: pyqt5
            coverage: no_cov
            min_req: ""
            toxenv: py310-linux-pyqt5-no_cov
          - label: initial ubuntu py3.14 pyqt6
            python: "3.14"
            platform: ubuntu-latest
            backend: pyqt6
            coverage: no_cov
            min_req: ""
            toxenv: py314-linux-pyqt6-no_cov
    with:
      python_version: ${{ matrix.python }}
      platform: ${{ matrix.platform }}
      qt_backend: ${{ matrix.backend }}
      coverage: ${{ matrix.coverage }}
      min_req: ${{ matrix.MIN_REQ }}
      artifacts_suffix: "initial"
      toxenv: ${{ matrix.toxenv }}

  test:
    # Flat include-only matrix: each row is one tox run (no cartesian product).
    # label is the GitHub check name; toxenv must match tox.ini envlist.
    name: ${{ matrix.label }}
    uses: ./.github/workflows/reusable_run_tox_test.yml
    needs: test_initial
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Core: Ubuntu + Python 3.13 + PyQt5/PyQt6 (coverage) ---
          - label: ubuntu py3.13 pyqt5 cov
            python: "3.13"
            platform: ubuntu-latest
            backend: pyqt5
            coverage: cov
            toxenv: py313-linux-pyqt5-cov
          - label: ubuntu py3.13 pyqt6 cov
            python: "3.13"
            platform: ubuntu-latest
            backend: pyqt6
            coverage: cov
            toxenv: py313-linux-pyqt6-cov
          # --- Windows ---
          - label: windows py3.11 pyqt5
            python: "3.11"
            platform: windows-2022
            backend: pyqt5
            coverage: no_cov
            toxenv: py311-windows-pyqt5-no_cov
          - label: windows py3.13 pyqt6 cov
            python: "3.13"
            platform: windows-2022
            backend: pyqt6
            coverage: cov
            toxenv: py313-windows-pyqt6-cov
          # --- macOS ---
          - label: macos intel py3.13 pyqt5_no_numba
            python: "3.13"
            platform: macos-15-intel
            backend: pyqt5_no_numba
            coverage: no_cov
            timeout-minutes: 60
            toxenv: py313-macos-pyqt5_no_numba-no_cov
          - label: macos arm py3.13 pyqt6
            python: "3.13"
            platform: macos-latest
            backend: pyqt6
            coverage: no_cov
            timeout-minutes: 60
            toxenv: py313-macos-pyqt6-no_cov
          # --- Min pinned deps (ubuntu-22.04) ---
          - label: min-reqs ubuntu py3.10 pyqt5 cov
            python: "3.10"
            platform: ubuntu-22.04
            backend: pyqt5
            MIN_REQ: 1
            coverage: cov
            toxenv: py310-linux-pyqt5-cov
          - label: min-reqs ubuntu py3.12 pyqt6 all_optional cov
            python: "3.12"
            platform: ubuntu-22.04
            backend: pyqt6
            coverage: cov
            tox_extras: "all_optional"
            toxenv: py312-linux-pyqt6-cov
          # --- Headless (no Qt UI) ---
          - label: headless ubuntu py3.11
            python: "3.11"
            platform: ubuntu-22.04
            backend: headless
            coverage: no_cov
            toxenv: py311-linux-headless-no_cov
          # --- Optional stacks on top of core ubuntu pyqt6 ---
          - label: ubuntu py3.13 pyqt6 +testing_extra cov
            python: "3.13"
            platform: ubuntu-latest
            backend: pyqt6
            coverage: cov
            tox_extras: "testing_extra"
            toxenv: py313-linux-pyqt6-cov
          - label: ubuntu py3.13 pyqt6_no_numba cov
            python: "3.13"
            platform: ubuntu-latest
            backend: pyqt6_no_numba
            coverage: cov
            toxenv: py313-linux-pyqt6_no_numba-cov
          - label: ubuntu py3.13 pyside6 cov
            python: "3.13"
            platform: ubuntu-latest
            backend: pyside6
            coverage: cov
            toxenv: py313-linux-pyside6-cov
    with:
      python_version: ${{ matrix.python }}
      platform: ${{ matrix.platform }}
      qt_backend: ${{ matrix.backend }}
      min_req: ${{ matrix.MIN_REQ }}
      coverage: ${{ matrix.coverage }}
      tox_extras: ${{ matrix.tox_extras }}
      timeout: ${{ matrix.timeout-minutes || 40 }}
      toxenv: ${{ matrix.toxenv }}


  test_pip_install:
    needs: test_initial
    name: pip install
    uses: ./.github/workflows/reusable_pip_test.yml

  test_examples:
    name: test examples
    uses: ./.github/workflows/reusable_run_tox_test.yml
    needs: test_initial
    with:
        toxenv: py312-linux-pyqt6-examples-cov
        timeout: 60
        python_version: 3.12
        constraints_suffix: _examples
        coverage: cov

  coverage_report:
    if: ${{ always() }}
    secrets: inherit
    needs:
      - test
      - test_examples
    uses: napari/shared-workflows/.github/workflows/upload_coverage.yml@main
    with:
      artifact-pattern: 'coverage reports*'


  test_benchmarks:
    name: test benchmarks
    runs-on: ubuntu-latest
    needs: test_initial
    timeout-minutes: 60
    env:
      GIT_LFS_SKIP_SMUDGE: 1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.12
          cache-dependency-path: pyproject.toml

      - name: Setup headless display
        uses: pyvista/setup-headless-display-action@7d84ae825e6d9297a8e99bdbbae20d1b919a0b19 # v4.2
        with:
          qt: true
          wm: herbstluftwm

      - name: Download benchmark data
        run: |
          wget https://data.napari.dev/triangulation-benchmark-shapes.zip
          unzip triangulation-benchmark-shapes.zip -d src/napari/benchmarks/
          rm triangulation-benchmark-shapes.zip

      - uses: octokit/request-action@05a2312de9f8207044c4c9e41fe19703986acc13 # v2.x
        # here we get hash of the latest release commit to compare with PR
        id: latest_release
        with:
          route: GET /repos/{owner}/{repo}/releases/latest
          owner: napari
          repo: napari
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: install dependencies
        run: |
          pip install --upgrade pip
          pip install "asv[virtualenv]"
        env:
          PIP_CONSTRAINT: resources/constraints/benchmark.txt

      - name: asv machine
        run: asv machine --yes

      - name: Run benchmarks PR
        run: |
          asv run --show-stderr --quick  --attribute timeout=300 HEAD^!
        env:
          PR: 1 # prevents asv from running very compute-intensive benchmarks
          PIP_CONSTRAINT: ${{ github.workspace }}/resources/constraints/benchmark.txt

      - name: Run benchmarks latest release
        # here we check if the benchmark on the latest release is not broken
        run: |
          asv run --show-stderr --quick  --attribute timeout=300  ${{ fromJSON(steps.latest_release.outputs.data).target_commitish }}^!
        env:
          PR: 1  # prevents asv from running very compute-intensive benchmarks
          PIP_CONSTRAINT: ${{ github.workspace }}/resources/constraints/benchmark.txt

      - name: Upload triangulation artifacts
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: triangulation-benchmarks
          path: /tmp/napari*
