# Keep in sync with: https://github.com/napari/docs/blob/main/.circleci/config.yaml
# Reference: https://circleci.com/docs/2.1/configuration-reference
version: 2.1

jobs:
  build-docs:
    docker:
      - image: cimg/python:3.12.13
        # https://circleci.com/developer/images/image/cimg/python
    environment:
      XDG_CACHE_HOME: /home/circleci/.cache
    steps:
      - checkout:
          method: full
          path: napari

      - restore_cache:
          keys:
            - pooch-v1-{{ checksum "napari/resources/constraints/constraints_py3.12_docs.txt" }}
            - pooch-v1-

      - run:
          name: Clone docs repository
          command: git clone --depth=1 https://github.com/napari/docs.git docs

      - run:
          name: Install Qt/X11 deps and xvfb
          command: |
            sudo apt-get update
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
              xvfb libegl1 libdbus-1-3 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 \
              libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 \
              libxcb-xinput0 libxcb-xfixes0 x11-utils

      - run:
          name: Create venv
          command: |
            uv venv
            . .venv/bin/activate

      - run:
          name: Install napari (docs extras)
          command: |
            . .venv/bin/activate
            uv pip install -e "napari/[pyqt5]" --group napari/pyproject.toml:docs
          environment:
            UV_CONSTRAINT: napari/resources/constraints/constraints_py3.12_docs.txt

      - run:
          name: Build HTML docs
          command: |
            . .venv/bin/activate
            cd docs
            xvfb-run --auto-servernum make html
          environment:
            UV_CONSTRAINT: ../napari/resources/constraints/constraints_py3.12_docs.txt
          no_output_timeout: 30m

      - store_artifacts:
          path: docs/docs/_build/html/

      - save_cache:
          key: pooch-v1-{{ checksum "napari/resources/constraints/constraints_py3.12_docs.txt" }}
          paths:
            - ~/.cache/scikit-image
            - ~/.cache/napari-*
            - ~/.cache/pooch

workflows:
  build-docs:
    jobs:
      - build-docs
